name: SonarQube on Main Branch

on:
  push:
    branches: [ main ]
 
permissions:
  contents: read

jobs:
  # Build job to compile the code and create a JAR artifact
  Build:
    runs-on: ubuntu-latest

    steps:
    - name: Code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 1

    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Maven repository
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-maven-

    - name: Maven Build
      run: mvn clean package -DskipTests

    - name: Upload classes
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: urlshortener-classes
        path: target/classes
        retention-days: 1


  # Unit tests job to run tests on the main branch
  Unit-Tests:
    runs-on: ubuntu-latest

    steps:
    - name: Code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 1
    
    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Cache Maven repository
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-maven-

    - name: Run Unit Tests
      run: mvn test

    - name: Upload Unit Test exec
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: jacoco-ut
        path: target/jacoco-ut.exec
        retention-days: 1


  # Integration tests job to run integration tests on the main branch
  Integration-Tests:
    runs-on: ubuntu-latest

    steps:
    - name: Code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 1

    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Maven repository
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-maven-

    - name: Run Integration Tests
      run: mvn verify -Pintegration-tests -DskipUnitTests

#    - name: Upload Integration Test exec
#      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
#      with:
#        name: jacoco-it
#        path: target/jacoco-it.exec
#        retention-days: 1

  
  # SonarQube analysis job to perform static code analysis for maven projects
  SonarQube-Analysis:
    runs-on: ubuntu-latest
    needs: [Build, Unit-Tests, Integration-Tests]

    steps:
    - name: Code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    
    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Cache Maven repository
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-maven-

    - name: Cache SonarQube dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.sonar
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar
    
    - name: Download classes
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
          name: urlshortener-classes
          path: target/classes

    - name: Download Unit Test exec
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: jacoco-ut
        path: target/

#    - name: Download Integration Test exec
#      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
#      with:
#        name: jacoco-it
#        path: target/

    - name: Build and analyze with SonarQube
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        mvn sonar:sonar -DskipTests \
              -Dsonar.projectVersion=${{ github.run_number }} \
              -Dsonar.projectKey=CemTbi_UrlShortener \
              -Dsonar.organization=cemtbi \
              -Dsonar.host.url=https://sonarcloud.io 