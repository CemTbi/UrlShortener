name: CI/CD Pipeline


on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


permissions:
  contents: read


jobs:
  # Build job to compile the code and create a JAR artifact
  Build:
    runs-on: ubuntu-latest

    steps:
    - name: Code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Maven Build
      run: mvn clean install -DskipTests

    - name: Upload artifact (JAR)
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: urlshortener
        path: target/*.jar


  # Unit tests job to run tests on the main branch
  Unit-Tests:
    runs-on: ubuntu-latest
    needs: Build

    steps:
    - name: Code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Maven Test on main branch
      if: github.ref == 'refs/heads/main'
      run: mvn test


  # Integration tests job to run integration tests on the main branch
  Integration-Tests:
    runs-on: ubuntu-latest
    needs: Build

    steps:
    - name: Code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Maven Integration Test on main branch
      if: github.ref == 'refs/heads/main'
      run: mvn verify -Pintegration-tests -DskipUnitTests

  
  # SonarQube analysis job to perform static code analysis for maven projects
  SonarQube-Analysis:
    runs-on: ubuntu-latest
    needs: Build

    if: github.ref == 'refs/heads/main' # Run SonarQube analysis only on the main branch
    steps:
    - name: Code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    
    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Cache SonarQube dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.sonar
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Cache Maven packages
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Build and analyze with SonarQube
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=CemTbi_UrlShortener

  # SonarQube Quality Gate job
  SonarQube-Quality-Gate:
    runs-on: ubuntu-latest
    needs: SonarQube-Analysis

    if: github.ref == 'refs/heads/main' # Run Quality Gate check only on the main branch
    steps:
    - name: Check SonarQube Quality Gate status
      uses: sonarsource/sonar-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
      with:
        sonar-token: ${{ secrets.SONAR_TOKEN }}
    
    -name: Handle Quality Gate failure
      if: failure()
      run: echo "SonarQube Quality Gate failed! Please check the SonarQube dashboard for details."
  
  # Docker Build job
  Docker-Build:
    runs-on: ubuntu-latest
    needs: [Build, Unit-Tests, Integration-Tests, SonarQube-Analysis, SonarQube-Quality-Gate]

    if: github.ref == 'refs/heads/main' && success() && needs.SonarQube-Quality-Gate.result == 'success'
    steps:
    - name: Code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Build Docker image
      run: docker build -t urlshortener:latest -f Dockerfiles/app/Dockerfile .
      

  # Trivy Security Scan job to perform security scanning on the codebase
  Security-Scan:
