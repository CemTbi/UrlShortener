name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write

jobs:
  # Build job to compile the code and create a JAR artifact
  Build:
    runs-on: ubuntu-latest

    steps:
    - name: Code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Maven Build
      run: mvn clean install -DskipTests

    - name: Upload artifact (JAR)
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: urlshortener
        path: target/*.jar


  # Unit tests job to run tests on the main branch
  Unit-Tests:
    runs-on: ubuntu-latest
    needs: Build

    if: github.ref == 'refs/heads/main'
    steps:
    - name: Code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    
    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
    
    - name: Download JAR artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: urlshortener
        path: target/*.jar

    - name: Maven Test on main branch
      run: mvn test


  # Integration tests job to run integration tests on the main branch
  Integration-Tests:
    runs-on: ubuntu-latest
    needs: Build

    if: github.ref == 'refs/heads/main'
    steps:
    - name: Code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
    
    - name: Download JAR artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: urlshortener
        path: target/*.jar

    - name: Maven Integration Test on main branch
      run: mvn verify -Pintegration-tests -DskipUnitTests


  # OWASP Dependency Check job to perform security scanning on the codebase
  OWASP-Dependency-Check:
    runs-on: ubuntu-latest
    needs: Build

    if: github.ref == 'refs/heads/main'
    steps:
    - name: Code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    
    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Run OWASP Dependency Check
      run: mvn org.owasp:dependency-check-maven:check -DfailOnCVSS=7.0 -Dformat=HTML,JSON -DoutputDirectory=dependency-check-report

    - name: Upload OWASP Dependency Check report
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: owasp-reports
        path: dependency-check-report/

  
  # SonarQube analysis job to perform static code analysis for maven projects
  SonarQube-Analysis:
    runs-on: ubuntu-latest
    needs: Build

    if: github.ref == 'refs/heads/main' # Run SonarQube analysis only on the main branch
    steps:
    - name: Code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    
    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Cache SonarQube dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.sonar
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Cache Maven packages
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Build and analyze with SonarQube
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=CemTbi_UrlShortener


  # SonarQube Quality Gate job
  SonarQube-Quality-Gate:
    runs-on: ubuntu-latest
    needs: SonarQube-Analysis

    if: github.ref == 'refs/heads/main' # Run Quality Gate check only on the main branch
    steps:
    - name: Check SonarQube Quality Gate status
      uses: sonarsource/sonar-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
      with:
        sonar-token: ${{ secrets.SONAR_TOKEN }}
    
    - name: Handle Quality Gate failure
      if: failure()
      run: echo "SonarQube Quality Gate failed! Please check the SonarQube dashboard for details."


  # Trivy filesystem scan job to perform security scanning on the codebase
  Trivy-Filesystem-Scan:
    runs-on: ubuntu-latest
    needs: [Build, OWASP-Dependency-Check]

    if: github.ref == 'refs/heads/main'
    steps:
    - name: code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Run Trivy filesystem scan
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        scan-type: 'fs'
        format: 'sarif'
        severity: 'CRITICAL,HIGH'
        exit-code: '1'
        vuln-type: 'os,library'
        output: 'trivy-fs-results.sarif'

    - name: Upload SARIF to GitHub Security tab
      if: always()
      uses: github/codeql-action/upload-sarif@7851e55dc3be31ec4bcc3ef98453de2cb306e698 # v4.35.3
      with:
        sarif_file: 'trivy-fs-results.sarif'

    - name: Upload Trivy filesystem scan results as artifact
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: trivy-filesystem-scan-results
        path: trivy-fs-results.sarif


  # Docker Build job
  Docker-Build:
    runs-on: ubuntu-latest
    needs: [Build, Unit-Tests, Integration-Tests, SonarQube-Quality-Gate]

    if: github.ref == 'refs/heads/main' && success() && needs.SonarQube-Quality-Gate.result == 'success'
    steps:
    - name: Code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Build Docker image
      run: docker build -t urlshortener:latest -f Dockerfiles/app/Dockerfile .
    
    - name: Save Docker image as artifact
      run: docker save urlshortener:latest -o urlshortener-latest.tar

    - name: Upload Docker image as artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: docker-image
        path: urlshortener-latest.tar
      

  # Trivy image scan job to perform security scanning on the built Docker image
  Trivy-Image-Scan:
    runs-on: ubuntu-latest
    needs: Docker-Build

    if: github.ref == 'refs/heads/main' && success() && needs.Docker-Build.result == 'success'
    steps:
    - name: code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Download Docker image artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: docker-image

    - name: Load Docker image
      run: docker load -i urlshortener-latest.tar

    - name: Run Trivy image scan
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        scan-type: 'image'
        scan-ref: 'urlshortener:latest'
        format: 'sarif'
        severity: 'CRITICAL,HIGH'
        exit-code: '1'
        vuln-type: 'os,library'
        output: 'trivy-image-results.sarif'

    - name: Upload SARIF to GitHub Security tab
      if: always()
      uses: github/codeql-action/upload-sarif@7851e55dc3be31ec4bcc3ef98453de2cb306e698 # v4.35.3
      with:
        sarif_file: 'trivy-image-results.sarif'

    - name: Upload Trivy image scan results as artifact
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: trivy-image-scan-results
        path: trivy-image-results.sarif

  # Docker Push to GHCR
  Docker-Push-GHCR:
    runs-on: ubuntu-latest
    needs: Trivy-Image-Scan

    if: github.ref == 'refs/heads/main' && success() && needs.Trivy-Image-Scan.result == 'success'

    permissions:
      packages: write
      contents: read

    steps:
    - name: code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Download Docker image artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: docker-image

    - name: Load Docker image
      run: docker load -i urlshortener-latest.tar

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Tag and push Docker image to GHCR
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.0.1
      with:
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/urlshortener:latest
          ghcr.io/${{ github.repository_owner }}/urlshortener:${{ github.sha }}