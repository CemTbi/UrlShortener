name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  # Build job to compile the code and create a JAR artifact
  Build:
    runs-on: ubuntu-latest

    steps:
    - name: Code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 1

    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Maven Build
      run: mvn clean install -DskipTests

    - name: Upload artifact (JAR)
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: urlshortener
        path: target/*.jar

    - name: Upload Maven repository cache
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: maven-repository-cache
        path: ~/.m2/repository
        retention-days: 1

  # Unit tests job to run tests on the main branch
  Unit-Tests:
    runs-on: ubuntu-latest
    needs: Build

    steps:
    - name: Code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 1
    
    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
    
    - name: Download JAR artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: urlshortener
        path: target/
    
    - name: Restore Maven repository cache
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: maven-repository-cache
        path: ~/.m2/repository

    - name: Run Unit Tests
      run: mvn test -o


  # Integration tests job to run integration tests on the main branch
  Integration-Tests:
    runs-on: ubuntu-latest
    needs: Build

    steps:
    - name: Code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 1

    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
    
    - name: Download JAR artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: urlshortener
        path: target/

    - name: Restore Maven repository cache
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: maven-repository-cache
        path: ~/.m2/repository

    - name: Run Integration Tests
      run: mvn verify -Pintegration-tests -DskipUnitTests -o


  # OWASP Dependency Check job to perform security scanning on the codebase
  OWASP-Dependency-Check:
    runs-on: ubuntu-latest
    needs: Build

    steps:
    - name: Code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    
    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Restore cached OWASP Check
      id: cache-owasp-check-restore
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.owasp-dependency-check
        key: ${{ runner.os }}-owasp-${{ hashFiles('**/pom.xml') }}-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-owasp-${{ hashFiles('**/pom.xml') }}-
          ${{ runner.os }}-owasp-

    - name: Run OWASP Dependency Check
      env:
        NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
      run: |
        mvn clean verify \
        -Powasp-dependency-check \
        -DskipTests \
        -DnvdApiKey=${{ secrets.NVD_API_KEY }}  

    - name: Upload OWASP Dependency Check report
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: dependency-check-report
        path: |
          **/target/dependency-check-report.html
          **/target/dependency-check-report.json
        retention-days: 30

  
  # SonarQube analysis job to perform static code analysis for maven projects
  SonarQube-Analysis:
    runs-on: ubuntu-latest
    needs: Build

    steps:
    - name: Code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    
    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Cache SonarQube dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.sonar
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Build and analyze with SonarQube
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        mvn verify sonar:sonar \
              -Dsonar.projectKey=CemTbi_UrlShortener \
              -Dsonar.organization=cemtbi \
              -Dsonar.host.url=https://sonarcloud.io \
              -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
              -Dsonar.qualitygate.wait=true
    
    - name: Handle Quality Gate failure
      if: failure()
      run: echo "SonarQube Quality Gate failed! Please check the SonarQube dashboard for details."


  # Trivy filesystem scan job to perform security scanning on the codebase
  Trivy-Filesystem-Scan:
    runs-on: ubuntu-latest
    needs: Build

    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
    - name: Code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Run Trivy filesystem scan
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        scan-type: 'fs'
        format: 'sarif'
        severity: 'CRITICAL,HIGH'
        exit-code: '1'
        vuln-type: 'os,library'
        output: 'trivy-fs-results.sarif'

    - name: Upload SARIF to GitHub Security tab
      if: always()
      uses: github/codeql-action/upload-sarif@7851e55dc3be31ec4bcc3ef98453de2cb306e698 # v4.35.3
      with:
        sarif_file: 'trivy-fs-results.sarif'

    - name: Upload Trivy filesystem scan results as artifact
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: trivy-filesystem-scan-results
        path: trivy-fs-results.sarif


  # Docker Build job
  Docker-Build:
    runs-on: ubuntu-latest
    needs: [Build, Unit-Tests, Integration-Tests, OWASP-Dependency-Check, SonarQube-Analysis, Trivy-Filesystem-Scan]

    steps:
    - name: Code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Build Docker image
      run: docker build -t urlshortener:latest -f Dockerfiles/app/Dockerfile .
    
    - name: Save Docker image as artifact
      run: docker save urlshortener:latest -o urlshortener-latest.tar

    - name: Upload Docker image as artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: docker-image
        path: urlshortener-latest.tar
      

  # Trivy image scan job to perform security scanning on the built Docker image
  Trivy-Image-Scan:
    runs-on: ubuntu-latest
    needs: Docker-Build

    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
    - name: code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Download Docker image artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: docker-image

    - name: Load Docker image
      run: docker load -i urlshortener-latest.tar

    - name: Run Trivy image scan
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        scan-type: 'image'
        scan-ref: 'urlshortener:latest'
        format: 'sarif'
        severity: 'CRITICAL,HIGH'
        exit-code: '1'
        limit-severities-for-sarif: true
        vuln-type: 'os'
        output: 'trivy-image-results.sarif'

    - name: Upload SARIF to GitHub Security tab
      if: always()
      uses: github/codeql-action/upload-sarif@7851e55dc3be31ec4bcc3ef98453de2cb306e698 # v4.35.3
      with:
        sarif_file: 'trivy-image-results.sarif'

    - name: Upload Trivy image scan results as artifact
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: trivy-image-scan-results
        path: trivy-image-results.sarif


  # Docker Push to GHCR
  Docker-Push-GHCR:
    runs-on: ubuntu-latest
    needs: Trivy-Image-Scan

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      packages: write
      contents: read

    steps:
    - name: Download Docker image artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: docker-image

    - name: Load Docker image
      run: docker load -i urlshortener-latest.tar

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Tag and push Docker image to GHCR
      run: |
        REP_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        IMAGE_NAME=ghcr.io/${REP_OWNER}/urlshortener
        docker tag urlshortener:latest ${IMAGE_NAME}:latest
        docker tag urlshortener:latest ${IMAGE_NAME}:${{ github.sha }}
        docker push ${IMAGE_NAME}:latest
        docker push ${IMAGE_NAME}:${{ github.sha }}


  # Local Integration Test against the docker image
  Local-Integration-Test:
    runs-on: ubuntu-latest
    needs: Docker-Push-GHCR

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      packages: read

    steps:
    - name: code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Pull Docker image from GHCR and test image
      run: |
        # Pull image
        REP_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        IMAGE_NAME=ghcr.io/${REP_OWNER}/urlshortener:latest
        docker pull ${IMAGE_NAME}

        # start db container
        DB_HOST=db docker compose up -d

        # Wait for the application to start up
        sleep 15

        # Perform a health check to verify the application is running
        if ! curl -f http://localhost:8080/actuator/health; then
          echo "ERROR: Application is not running. Container-Logs:"
          docker compose logs app
          exit 1
        fi

        # Cleanup
        docker compose down