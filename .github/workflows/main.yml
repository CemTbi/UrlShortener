name: CI/CD Pipeline

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ main, dev ]

permissions:
  contents: read

jobs:
  # Build job to compile the code and create a JAR artifact
  Build:
    runs-on: ubuntu-latest

    steps:
    - name: Code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 1

    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Maven repository
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-maven-

    - name: Maven Build
      run: mvn clean package -DskipTests

    - name: Upload classes
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: urlshortener-classes
        path: target/classes
        retention-days: 1


  # Unit tests job to run tests on the main branch
  Unit-Tests:
    runs-on: ubuntu-latest

    steps:
    - name: Code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 1
    
    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Cache Maven repository
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-maven-

    - name: Run Unit Tests
      run: mvn test

    - name: Upload Unit Test exec
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: jacoco-ut
        path: target/site/jacoco-ut/
        retention-days: 1


  # Integration tests job to run integration tests on the main branch
  Integration-Tests:
    runs-on: ubuntu-latest

    steps:
    - name: Code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 1

    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Maven repository
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-maven-

    - name: Run Integration Tests
      run: mvn verify -Pintegration-tests -DskipUnitTests

#    - name: Upload Integration Test exec
#      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
#      with:
#        name: jacoco-it
#        path: target/site/jacoco-it/
#        retention-days: 1

  
  # SonarQube analysis job to perform static code analysis for maven projects
  SonarQube-Analysis:
    runs-on: ubuntu-latest
    needs: [Build, Unit-Tests, Integration-Tests]

    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
    - name: Code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    
    - name: Set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Cache Maven repository
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-maven-

    - name: Cache SonarQube dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.sonar
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar
    
    - name: Download classes
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
          name: urlshortener-classes
          path: target/classes

    - name: Download Unit Test exec
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: jacoco-ut
        path: target/site/jacoco-ut/

#    - name: Download Integration Test exec
#      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
#      with:
#        name: jacoco-it
#        path: target/site/jacoco-it/

    - name: Build and analyze with SonarQube
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        mvn sonar:sonar -DskipTests \
              -Dsonar.projectVersion=${{ github.run_number }} \
              -Dsonar.projectKey=CemTbi_UrlShortener \
              -Dsonar.organization=cemtbi \
              -Dsonar.host.url=https://sonarcloud.io 


  # Trivy filesystem scan job to perform security scanning on the codebase
  Trivy-Filesystem-Scan:
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
    - name: Code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 1

    - name: Run Trivy filesystem scan
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        scan-type: 'fs'
        format: 'sarif'
        severity: 'CRITICAL,HIGH'
        exit-code: '1'
        vuln-type: 'os,library'
        output: 'trivy-fs-results.sarif'

    - name: Upload SARIF to GitHub Security tab
      if: always()
      uses: github/codeql-action/upload-sarif@7851e55dc3be31ec4bcc3ef98453de2cb306e698 # v4.35.3
      with:
        sarif_file: 'trivy-fs-results.sarif'

    - name: Upload Trivy filesystem scan results as artifact
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: trivy-filesystem-scan-results
        path: trivy-fs-results.sarif
        retention-days: 1


  # Docker Build job
  Docker-Build:
    runs-on: ubuntu-latest
    needs: [Build, Unit-Tests, Integration-Tests, SonarQube-Analysis, Trivy-Filesystem-Scan]

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 1

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Build Docker image
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        context: .
        file: Dockerfiles/app/Dockerfile
        tags: urlshortener:latest
        load: true
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Save Docker image as artifact
      run: docker save urlshortener:latest -o urlshortener-latest.tar

    - name: Upload Docker image as artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: docker-image
        path: urlshortener-latest.tar
        retention-days: 1
      

  # Trivy image scan job to perform security scanning on the built Docker image
  Trivy-Image-Scan:
    runs-on: ubuntu-latest
    needs: Docker-Build

    permissions:
      security-events: write
      contents: read
      actions: read

    if: github.event_name == 'pull_request' && github.ref == 'refs/heads/main'
    steps:
    - name: Code checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 1

    - name: Download Docker image artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: docker-image

    - name: Load Docker image
      run: docker load -i urlshortener-latest.tar

    - name: Run Trivy image scan
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
      with:
        scan-type: 'image'
        scan-ref: 'urlshortener:latest'
        format: 'sarif'
        severity: 'CRITICAL,HIGH'
        exit-code: '1'
        limit-severities-for-sarif: true
        vuln-type: 'os'
        output: 'trivy-image-results.sarif'

    - name: Upload SARIF to GitHub Security tab
      if: always()
      uses: github/codeql-action/upload-sarif@7851e55dc3be31ec4bcc3ef98453de2cb306e698 # v4.35.3
      with:
        sarif_file: 'trivy-image-results.sarif'

    - name: Upload Trivy image scan results as artifact
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: trivy-image-scan-results
        path: trivy-image-results.sarif
        retention-days: 1


  # Docker Push to GHCR
  Docker-Push-GHCR:
    runs-on: ubuntu-latest
    needs: Trivy-Image-Scan

    permissions:
      packages: write
      contents: read

    if: github.event_name == 'pull_request' && github.ref == 'refs/heads/main'
    steps:
    - name: Download Docker image artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: docker-image

    - name: Load Docker image
      run: docker load -i urlshortener-latest.tar

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Tag and push Docker image to GHCR
      run: |
        REP_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        IMAGE_NAME=ghcr.io/${REP_OWNER}/urlshortener
        docker tag urlshortener:latest ${IMAGE_NAME}:latest
        docker tag urlshortener:latest ${IMAGE_NAME}:${{ github.sha }}
        docker push ${IMAGE_NAME}:latest
        docker push ${IMAGE_NAME}:${{ github.sha }}